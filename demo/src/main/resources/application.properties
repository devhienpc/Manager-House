spring.application.name=demo

# ===============================
# CẤU HÌNH KẾT NỐI SUPABASE (POSTGRESQL)
# ===============================
# LƯU Ý: Thay thế [YOUR-SUPABASE-HOST], [YOUR-PORT], [YOUR-DATABASE], [YOUR-USERNAME], [YOUR-PASSWORD] bằng thông tin của bạn.
spring.datasource.url=${DB_URL:jdbc:postgresql://db.yxbswgkdggwdxvfvuzyn.supabase.co:5432/postgres?sslmode=require}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:hien,dz@123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# CẤU HÌNH HIBERNATE & JPA
# ===============================
# Quan trọng: Lệnh này giúp Java tự động tạo bảng "rooms" trên Supabase ngay khi chạy
spring.jpa.hibernate.ddl-auto=update

# Hiển thị câu lệnh SQL trong log để dễ debug
spring.jpa.show-sql=true

# Chỉ định phương ngữ PostgreSQL (Supabase dùng PostgreSQL)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Định dạng output SQL cho dễ đọc
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# CẤU HÌNH BỔ SUNG
# ===============================
server.port=8080
