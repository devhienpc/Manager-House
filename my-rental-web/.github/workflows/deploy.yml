name: Deploy React Vite to GitHub Pages

on:
  # Chạy khi có code đẩy lên nhánh main
  push:
    branches: ["main"]
  # Cho phép chạy thủ công từ giao diện GitHub
  workflow_dispatch:

# Quyền cần thiết để GitHub Actions ghi lên GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Tránh việc chạy nhiều workflow deploy cùng lúc gây xung đột
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Tải code từ Repository
        uses: actions/checkout@v4

      - name: Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Cài đặt thư viện (Dependencies)
        run: npm ci

      - name: Build ứng dụng (Tạo thư mục dist)
        run: npm run build

      - name: Cấu hình GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload thư mục dist
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

      - name: Triển khai (Deploy) lên GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
